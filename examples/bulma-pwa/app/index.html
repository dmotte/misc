<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>My Bulma PWA</title>

    <link rel="icon" href="img/favicon-96x96.png" />

    <link rel="manifest" href="manifest.json" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
      integrity="sha384-DCY3M8xLkMu6c9IKcKbe+jHKMjelnwC0p+SBaxfHxoBYZWdJF2X400UdBCgATtAB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />

    <style type="text/css">
      /* Generated using the Customizer on https://bulma.io/ */
      :root {
        --bulma-primary-h: 171deg;
        --bulma-primary-s: 100%;
        --bulma-primary-l: 41%;
        --bulma-link-h: 171deg;
        --bulma-link-s: 100%;
        --bulma-link-l: 41%;
      }
    </style>

    <script type="module">
      class PWAInstallPrompt {
        static installPrompt = null;

        static initialize(callbackBeforeInstallPrompt, callbackAppInstalled) {
          window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            this.installPrompt = event;
            callbackBeforeInstallPrompt();
          });
          window.addEventListener("appinstalled", () => {
            this.installPrompt = null;
            callbackAppInstalled();
          });
        }

        static install() {
          if (!this.installPrompt)
            throw new Error(
              "The beforeinstallprompt event has not been triggered before",
            );
          const promise = this.installPrompt.prompt();
          this.installPrompt = null;
          return promise;
        }
      }

      class App {
        static showModalMsg(msg = "") {
          const modalMsg = document.getElementById("modalMsg"),
            pMsg = document.getElementById("pMsg");

          if (msg === "") {
            modalMsg.classList.remove("is-active");
            return;
          }

          pMsg.textContent = msg;
          modalMsg.classList.add("is-active");
        }

        ////////////////////////////////////////////////////////////////////////

        static body_onload() {
          window.addEventListener("error", (event) => {
            this.showModalMsg(`ERROR: ${event.error}`);
          });

          window.addEventListener("unhandledrejection", (event) => {
            this.showModalMsg(`ERROR: ${event.reason}`);
          });

          // Show the page body only when loaded, to prevent
          // the user from interacting early
          document.body.hidden = false;

          const notifPWA = document.getElementById("notifPWA");

          PWAInstallPrompt.initialize(
            () => (notifPWA.hidden = false),
            () => (notifPWA.hidden = true),
          );
        }

        static btnInstall_onclick() {
          const notifPWA = document.getElementById("notifPWA");

          this.showModalMsg("Installing...");

          (async () => {
            const result = await PWAInstallPrompt.install();

            notifPWA.hidden = true;
            // The result.outcome can be "accepted" or "dismissed". See
            // https://developer.mozilla.org/en-US/docs/Web/API/BeforeInstallPromptEvent/prompt#outcome
            alert(
              `The installation prompt has been ${result.outcome} by the user`,
            );

            this.showModalMsg();
          })();
        }
      }

      window.App = App;
    </script>
  </head>

  <body hidden onload="App.body_onload()">
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="#"><b>PWA</b></a>

        <a
          role="button"
          class="navbar-burger"
          aria-label="menu"
          aria-expanded="false"
          data-target="navbarMenu"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarMenu" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item">Home</a>

          <a class="navbar-item">Documentation</a>

          <div class="navbar-item has-dropdown is-hoverable">
            <a class="navbar-link">More</a>

            <div class="navbar-dropdown">
              <a class="navbar-item">About</a>
              <a class="navbar-item is-selected">Jobs</a>
              <a class="navbar-item">Contact</a>
              <hr class="navbar-divider" />
              <a class="navbar-item">Report an issue</a>
            </div>
          </div>
        </div>

        <div class="navbar-end">
          <div class="navbar-item">
            <div class="buttons">
              <a class="button is-primary"><strong>Sign up</strong></a>
              <a class="button is-light">Log in</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title">My Bulma PWA</h1>

        <h2 class="subtitle">This is the <strong>subtitle</strong>.</h2>

        <div id="notifPWA" class="notification is-primary" hidden>
          <button class="delete"></button>
          <div class="block">
            Click the button below to <strong>install</strong> this web app as a
            <strong>PWA</strong>
          </div>
          <div class="block">
            <button class="button is-light" onclick="App.btnInstall_onclick()">
              <span class="icon">
                <span class="material-symbols-outlined">install_desktop</span>
              </span>
              <span>Install</span>
            </button>
          </div>
        </div>

        <div class="field">
          <label class="label">Name</label>
          <div class="control">
            <input class="input" type="text" placeholder="Text input" />
          </div>
        </div>

        <div class="field">
          <label class="label">Username</label>
          <div class="control has-icons-left has-icons-right">
            <input
              class="input is-success"
              type="text"
              placeholder="Text input"
              value="bulma"
            />
            <span class="icon is-small is-left">
              <span class="material-symbols-outlined">person</span>
            </span>
            <span class="icon is-small is-right">
              <span class="material-symbols-outlined">check</span>
            </span>
          </div>
          <p class="help is-success">This username is available</p>
        </div>

        <div class="field is-grouped">
          <div class="control">
            <button class="button is-primary">Submit</button>
          </div>
          <div class="control">
            <button class="button is-light">Cancel</button>
          </div>
        </div>
      </div>
    </section>

    <div id="modalMsg" class="modal">
      <div class="modal-background"></div>
      <div class="modal-content">
        <div class="box">
          <p id="pMsg"></p>
        </div>
      </div>
    </div>
  </body>
</html>
