<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>PyScript import example</title>

    <style type="text/css">
      :root {
        color-scheme: light dark;
      }
    </style>

    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2026.3.1/core.css"
      integrity="sha384-C7Vo5fjeYiyN27fdJgeiteaUwrLVW0+I9EbpT1kBxsxac8+kxV5zYrLayugNSu1q"
      crossorigin="anonymous"
    />

    <script
      type="module"
      src="https://pyscript.net/releases/2026.3.1/core.js"
      integrity="sha384-HzJarmn+/i7/2DvmCUgA4dBrX2ozIG20lmC9jCa2E1ZCy3IbsnEK58PAcx5QiYH+"
    ></script>

    <script type="py" src="functions.py"></script>
    <script type="py">
      from js import window

      window.sumPlusThree = sum_plus_three
    </script>

    <script type="text/javascript">
      function btnMain_onclick() {
        if (typeof sumPlusThree === "undefined")
          alert("Function not loaded yet");
        else alert("1 + 2 + 3 = " + sumPlusThree(1, 2));
      }
    </script>
  </head>

  <body>
    <input
      type="button"
      value="Show me some numbers"
      onclick="btnMain_onclick()"
    />
  </body>
</html>
