<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>cslcmgr</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />

    <style type="text/css">
      :root {
        color-scheme: light dark;
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      #dialogMsg::backdrop {
        background-color: #1118;
        backdrop-filter: blur(3px);
      }

      .select-none {
        user-select: none;
      }

      .color-green {
        color: #0c0;
      }
      .color-yellow {
        color: #fc0;
      }
      .color-red {
        color: #d00;
      }
      .color-default {
        color: revert;
      }

      .cursor-default {
        cursor: default;
      }
      .cursor-pointer {
        cursor: pointer;
      }
    </style>

    <script type="module">
      class API {
        static apiURL = "..";

        static async json(path, options) {
          const response = await fetch(this.apiURL + path, options);
          if (!response.ok) throw new Error("HTTP error " + response.status);
          return await response.json();
        }

        static list() {
          return this.json("/list");
        }
        static state(id) {
          return this.json("/state/" + id);
        }
        static start(id) {
          return this.json("/start/" + id, { method: "POST" });
        }
        static stop(id) {
          return this.json("/stop/" + id, { method: "POST" });
        }
      }

      class CodespacesData {
        constructor(ids) {
          this.data = {};
          for (const id of ids) {
            if (!/^[0-9A-Za-z-]+$/u.test(id))
              throw new Error("Invalid codespace ID: " + id);
            this.data[id] = { state: "Unknown" };
          }
        }

        setState(id, state) {
          this.data[id].state = state;
        }

        getData() {
          return structuredClone(this.data);
        }
      }

      // Src: https://github.com/dmotte/misc/tree/main/snippets
      function xmlescape(x) {
        return x
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&apos;");
      }

      class App {
        static showModalMsg(msg = "") {
          const dialogMsg = document.getElementById("dialogMsg");

          if (msg === "") {
            dialogMsg.close();
            return;
          }

          dialogMsg.textContent = msg;
          dialogMsg.showModal();
        }

        ////////////////////////////////////////////////////////////////////////

        static csdata = null;

        ////////////////////////////////////////////////////////////////////////

        // List of all the possible states:
        // https://docs.github.com/en/rest/codespaces/codespaces?apiVersion=2026-03-10#get-a-codespace-for-the-authenticated-user
        static codespaceStates = {
          Archived: { icon: "offline_pin", color: "default" },
          Available: { icon: "circle", color: "green" },
          Awaiting: { icon: "pending", color: "yellow" },
          Created: { icon: "stars", color: "default" },
          Deleted: { icon: "cancel", color: "red" },
          Exporting: { icon: "outbound", color: "yellow" },
          Failed: { icon: "error", color: "red" },
          Moved: { icon: "arrow_circle_right", color: "red" },
          Provisioning: { icon: "pending", color: "yellow" },
          Queued: { icon: "pending", color: "yellow" },
          Rebuilding: { icon: "build_circle", color: "yellow" },
          Shutdown: { icon: "cancel", color: "default" },
          ShuttingDown: { icon: "pending", color: "yellow" },
          Starting: { icon: "pending", color: "yellow" },
          Unavailable: { icon: "cancel", color: "red" },
          Unknown: { icon: "help", color: "default" },
          Updating: { icon: "pending", color: "yellow" },
        };

        static update() {
          const tbody = document.getElementById("tblMain").tBodies[0];

          let tbodyHTML = "";

          for (const [csID, cs] of Object.entries(this.csdata.getData())) {
            const csState = cs.state;
            const csStateIcon = this.codespaceStates[csState].icon,
              csStateColor = this.codespaceStates[csState].color;

            const escID = xmlescape(csID),
              escState = xmlescape(csState),
              escStateIcon = xmlescape(csStateIcon),
              escStateColor = xmlescape(csStateColor);

            tbodyHTML += `
              <tr>
                <td class="select-none">
                  <span class="cursor-pointer material-symbols-outlined"
                    title="Fetch state"
                    onclick="App.btnFetchState_onclick('${escID}')">
                    autorenew
                  </span>
                </td>
                <td class="select-none">
                  <span class="cursor-default material-symbols-outlined
                      color-${escStateColor}" title="${escState}">
                    ${escStateIcon}
                  </span>
                </td>
                <td>${escID}</td>
                <td class="select-none">
                  &nbsp;
                  <span class="cursor-pointer material-symbols-outlined"
                    title="Stop" onclick="App.btnStop_onclick('${escID}')">
                    stop
                  </span>
                  <span class="cursor-pointer material-symbols-outlined"
                    title="Start" onclick="App.btnStart_onclick('${escID}')">
                    play_arrow
                  </span>
                </td>
              </tr>
            `;
          }

          tbody.innerHTML = tbodyHTML;
        }

        ////////////////////////////////////////////////////////////////////////

        static body_onload() {
          window.addEventListener("error", (event) => {
            this.showModalMsg(`ERROR: ${event.error}`);
          });

          window.addEventListener("unhandledrejection", (event) => {
            this.showModalMsg(`ERROR: ${event.reason}`);
          });

          this.showModalMsg("Fetching codespaces list...");

          (async () => {
            const data = await API.list();

            this.csdata = new CodespacesData(data.codespaces);
            this.update();

            this.showModalMsg();
          })();
        }

        static btnFetchState_onclick(id) {
          this.showModalMsg(`Fetching state of codespace ${id}...`);

          (async () => {
            const data = await API.state(id);

            this.csdata.setState(id, data.state);
            this.update();

            this.showModalMsg();
          })();
        }

        static btnStop_onclick(id) {
          this.showModalMsg(`Stopping codespace ${id}...`);

          (async () => {
            await API.stop(id);

            this.csdata.setState(id, "Unknown");
            this.update();

            this.showModalMsg();
          })();
        }

        static btnStart_onclick(id) {
          this.showModalMsg(`Starting codespace ${id}...`);

          (async () => {
            await API.start(id);

            this.csdata.setState(id, "Unknown");
            this.update();

            this.showModalMsg();
          })();
        }
      }

      window.App = App;
    </script>
  </head>

  <body onload="App.body_onload()">
    <h1>cslcmgr</h1>

    <table id="tblMain">
      <tbody></tbody>
    </table>

    <dialog id="dialogMsg" closedby="none"></dialog>
  </body>
</html>
